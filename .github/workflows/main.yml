name: Build and Deploy

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main

permissions:
    contents: write
    pages: write

jobs:
    build-and-deploy:
        concurrency: ci-${{ github.ref }}
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v1

            - name: Install and Build
              run: |
                  bun install
                  bun run build

            - name: Create .nojekyll
              run: touch build/.nojekyll # Note: SvelteKit builds to 'build' not 'dist'

            - name: Deploy to Pages
              uses: JamesIves/github-pages-deploy-action@v4.6.3
              with:
                  branch: gh-pages
                  folder: build
